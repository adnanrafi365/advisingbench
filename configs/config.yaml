project:
  name: "AdvisingBench"
  version: "v1"
  institution_scope: "University of Illinois Chicago"
  description: "A benchmark for evaluating hallucination and groundedness in LLM-generated academic advising answers."

data:
  raw_sources_file: "data/raw/uic_sources.csv"
  processed_chunks_file: "data/processed/source_chunks.csv"
  questions_file: "data/questions/advising_questions_v1.csv"
  outputs_dir: "data/outputs"
  scores_dir: "data/scores"

retrieval:
  chunk_size: 500
  chunk_overlap: 100
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  vector_store: "faiss"
  top_k: 5

pipelines:
  llm_only: true
  basic_rag: true
  citation_rag: true
  self_verification: false

evaluation:
  metrics:
    - factual_accuracy
    - hallucination_rate
    - groundedness
    - citation_precision
    - completeness
    - uncertainty_handling

demo:
  framework: "streamlit"
